<!DOCTYPE html> 

<html> 

<head> 

  

  <meta charset="UTF-8"> 

  <meta content="IE=Edge" http-equiv="X-UA-Compatible"> 

  <meta name="description" content="A new Flutter project."> 

  

  <!-- iOS meta tags & icons --> 

  <meta name="apple-mobile-web-app-capable" content="yes"> 

  <meta name="apple-mobile-web-app-status-bar-style" content="black"> 

  <meta name="apple-mobile-web-app-title" content="Tibe Rose house"> 

  <link rel="apple-touch-icon" href="icons/Icon-192.png"> 

  

  <!-- Favicon --> 

  <link rel="icon" type="image/png" href="favicon.png"/> 

  

  <title>Tibe Rose house</title> 

  <link rel="manifest" href="manifest.json"> 

  

  <style> 

    /* Install banner style */ 

    #install-banner { 

      display: none; 

      position: fixed; 

      bottom: 0; 

      left: 0; 

      right: 0; 

      background-color: #333; 

      color: white; 

      padding: 15px; 

      text-align: center; 

      font-size: 16px; 

      z-index: 1000; 

    } 

    #install-banner button { 

      background-color: #007BFF; 

      color: white; 

      border: none; 

      padding: 10px 20px; 

      cursor: pointer; 

    } 

  </style> 

</head> 

<body> 

  <script src="flutter_bootstrap.js" async></script> 

  

  <!-- Install Banner --> 

  <div id="install-banner"> 

    <p>Install this app to your home screen for easy access!</p> 

    <button id="install-btn">Install</button> 

  </div> 

  

  <script> 

    let deferredPrompt; 

  

    // Listen for the 'beforeinstallprompt' event 

    window.addEventListener('beforeinstallprompt', (e) => { 

      // Prevent the default install prompt 

      e.preventDefault(); 

      deferredPrompt = e; 

  

      // Show the install banner 

      document.getElementById('install-banner').style.display = 'block'; 

  

      // Add click event listener to the install button 

      document.getElementById('install-btn').addEventListener('click', () => { 

        // Show the prompt 

        deferredPrompt.prompt(); 

  

        // Wait for the user's response to the prompt 

        deferredPrompt.userChoice.then((choiceResult) => { 

          if (choiceResult.outcome === 'accepted') { 

            console.log('User accepted the install prompt'); 

          } else { 

            console.log('User dismissed the install prompt'); 

          } 

  

          // Reset deferredPrompt to null 

          deferredPrompt = null; 

          // Hide the install banner after prompt 

          document.getElementById('install-banner').style.display = 'none'; 

        }); 

      }); 

    }); 

  </script> 

</body> 

</html>
